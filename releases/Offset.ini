;---------------------------------- REGEX REPLACEMENT ----------------------------------

[ShaderRegexShadowBangs.Pattern]
(?'before'add r0.xyz, r0.xyzx, cb0\[\d+\].xyzx\n)
(?'after'mul r1.yzw, (?'reg'r\d).yyyy, cb3\[\d+\].xxyz\n
mad r1.yzw, cb3\[\d+\].xxyz, r0.xxxx, r1.yyzw\n
mad r0.xyz, cb3\[\d+\].xyzx, r0.zzzz, r1.yzwy\n
add r0.xyz, r0.xyzx, cb3\[\d+\].xyzx\n
add r1.y, cb0\[\d+\].y, l\(1.000000\)\n
mad r0.w, r0.w, cb0\[\d+\].x, cb0\[\d+\].x\n)

[ShaderRegexShadowBangs.Pattern.Replace]
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
${before}
add ${reg}.y, ${reg}.y, ${ini}.x\n
${after}

[ShaderRegexShadowLOD.Pattern]
(?'before'mul r\d.xyz, r\d.wwww, r\d.xyzx\n
mov r\d.x, cb\d\[0\].\w\n
mov r\d.y, cb\d\[1\].\w\n
mov r\d.z, cb\d\[2\].\w\n
add (?'reg'r\d).xyw, -cb1\[5\].xyxz, cb\d\[3\].xyxz\n)
(?'after'mov r\d.w, r\d.\w\n)

[ShaderRegexShadowLOD.Pattern.Replace]
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
${before}
add ${reg}.y, ${reg}.y, ${ini}.x\n
${after}

[ShaderRegexAA.Pattern]
(?'before'mov r\d.x, cb\d\[0\].\w\n
mov r\d.y, cb\d\[1\].\w\n
mov r\d.z, cb\d\[2\].\w\n
add (?'reg'r\d).xyw, -cb1\[5\].xyxz, cb\d\[3\].xyxz\n)
(?'after'mov r\d.w, r\d.\w\n
mov r\d.xyz, v0.xyzx\n
mov r\d.w, l\(1.000000\)\n
dp4 r\d.x, r\d.xyzw, r\d.xyzw\n)

[ShaderRegexAA.Pattern.Replace]
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
${before}
if_nz cb12\[3\].y\n
	add ${reg}.xyw, -cb2\[3\].xyxz, cb12\[3\].xyxz\n
	mul ${reg}.xyw, ${reg}.xw, -${ini}.yyyy\n
	add ${reg}.xyw, cb2\[3\].xyxz, ${reg}.xyw\n
	add ${reg}.xyw, -cb1\[5\].xyxz, ${reg}.xyw\n
endif\n
add ${reg}.y, ${reg}.y, ${ini}.x\n
${after}

[ShaderRegexAAnew.Pattern]
(?'before'add (?'reg'r\d).xyw, -cb1\[5\].xyxz, cb\d\[3\].xyxz\n)
(?'after'mov r\d.x, cb2\[0\].\w\n
mov r\d.y, cb2\[1\].\w\n
mov r\d.z, cb2\[2\].\w\n
mov r\d.w, r\d.\w\n
mov r\d.w, l\(1.000000\)\n
dp4 r\d.x, r\d.xyzw, r\d.xyzw\n)

[ShaderRegexAAnew.Pattern.Replace]
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
${before}
if_nz cb12\[3\].y\n
	add ${reg}.xyw, -cb2\[3\].xyxz, cb12\[3\].xyxz\n
	mul ${reg}.xyw, ${reg}.xw, -${ini}.yyyy\n
	add ${reg}.xyw, cb2\[3\].xyxz, ${reg}.xyw\n
	add ${reg}.xyw, -cb1\[5\].xyxz, ${reg}.xyw\n
endif\n
add ${reg}.y, ${reg}.y, ${ini}.x\n
${after}

[ShaderRegexAASkirk.Pattern]
(?'before'mov r\d.x, cb\d\[0\].\w\n
mov r\d.y, cb\d\[1\].\w\n
mov r\d.z, cb\d\[2\].\w\n
add (?'reg'r\d).xyw, -cb1\[5\].xyxz, cb\d\[3\].xyxz\n)
(?'after'mov r\d.w, r\d.\w\n
dp2 r\d.\w, v\d.xyxx, v\d.xyxx\n)

[ShaderRegexAASkirk.Pattern.Replace]
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
${before}
add ${reg}.y, ${reg}.y, ${ini}.x\n
${after}

[ShaderRegexAASecondPass.Pattern]
(?'before'mov o0.w, r4.w\n
add o0.z, -r1.y, r1.z\n
mov o1.xyzw, v2.xyzw\n
mul r4.xyzw, r0.yyyy, cb0\[\d+\].xyzw\n
mad r4.xyzw, cb0\[\d+\].xyzw, r0.xxxx, r4.xyzw\n
mad r4.xyzw, cb0\[\d+\].xyzw, r1.wwww, r4.xyzw\n
mad o2.xyzw, cb0\[\d+\].xyzw, r1.xxxx, r4.xyzw\n
movc r1.xyz, cb0\[\d+\].xxxx, v4.xyzx, v0.xyzx\n
mul r4.xyzw, r1.yyyy, cb5\[1\].xyzw\n
mad r4.xyzw, cb5\[0\].xyzw, r1.xxxx, r4.xyzw\n
mad r1.xyzw, cb5\[2\].xyzw, r1.zzzz, r4.xyzw\n
add r1.xyzw, r1.xyzw, cb5\[3\].xyzw\n)
(?'after'mul r3.yzw, (?'reg'r\d+).yyyy, cb0\[\d+\].xxyz\n
mad r3.yzw, cb0\[\d+\].xxyz, r1.xxxx, r3.yyzw\n
mad r1.xyz, cb0\[\d+\].xyzx, r1.zzzz, r3.yzwy\n
mad r1.xyz, cb0\[\d+\].xyzx, r1.wwww, r1.xyzx\n
mul r0.x, r0.w, -r1.z\n
lt r0.x, r0.x, cb0\[\d+\].y\n
movc r4.xyzw, r0.xxxx, r5.xyzw, r6.xyzw\n
mad r0.x, -r1.z, r0.w, -r4.x\n
add r0.yw, -r4.xxxz, r4.yyyw\n
max r0.y, r0.y, l\(0.001000\)\n)

[ShaderRegexAASecondPass.Pattern.Replace]
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
${before}
add ${reg}.y, ${reg}.y, ${ini}.x\n
${after}

[ShaderRegexAASecondPassnew.Pattern]
(?'before'movc r2.xyz, cb0\[\d+\].xxxx, r8.xywx, r2.xyzx\n
mul (?'reg'r\d+).xyzw, r2.yyyy, cb5\[1\].xyzw\n
mad r\d+.xyzw, cb5\[0\].xyzw, r\d+.xxxx, r\d+.xyzw\n
mad r\d+.xyzw, cb5\[2\].xyzw, r\d+.zzzz, r\d+.xyzw\n
add r\d+.xyzw, r10.xyzw, cb5\[3\].xyzw\n)
(?'after'mul r\d+.xyz, r\d+.yyyy, cb0\[\d+\].xyzx\n
mad r\d+.xyz, cb0\[\d+\].xyzx, r\d+.xxxx, r\d+.xyzx\n
mad r\d+.xyz, cb0\[\d+\].xyzx, r\d+.zzzz, r\d+.xyzx\n
mad r\d+.xyz, cb0\[\d+\].xyzx, r\d+.wwww, r\d+.xyzx\n
mul r\d+.\w, r0.\w, -r2.z\n
lt r\d+.\w, r\d+.\w, cb0\[\d+\].y\n
movc r7.xyzw, r\d+.\w+, r7.xyzw, r9.xyzw\n
mad r0.\w, -r2.\w, r0.\w, -r7.x\n
add r1.\w+, -r7.xxzx, r7.yywy\n
max r\d+.\w, r1.\w, l\(0.001000\)\n)

[ShaderRegexAASecondPassnew.Pattern.Replace]
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
${before}
if_nz cb13\[3\].y\n
	add r11.xyw, -cb3\[3\].xyxz, cb13\[3\].xyxz\n
	mul r11.xyw, r11.xw, -${ini}.yyy\n
	;mad r10.xyw, r11.xyw, l(1.0,0.99,1.0), r10.xyw\n
	add r10.xyw, r10.xyw, r11.xyw\n
endif\n
add ${reg}.y, ${reg}.y, ${ini}.x\n
${after}

[ShaderRegexMeshNatlanFace.Pattern]
(?'before'mul o\d+.xyz, r\d+.yyyy, r\d+.xyzx\n
mul (?'reg'r\d+).xyzw, [vr]\d+.yyyy, cb2\[1\].xyzw\n
mad r\d+.xyzw, cb2\[0\].xyzw, [vr]\d+.xxxx, r\d+.xyzw\n
mad r\d+.xyzw, cb2\[2\].xyzw, [vr]\d+.zzzz, r\d+.xyzw\n
add r\d+.xyzw, r\d+.xyzw, cb2\[3\].xyzw\n
mul r0.y, r\d+.y, cb3\[10\].z\n
mad r0.y, cb3\[9\].z, r\d+.x, r0.y\n
mad r0.y, cb3\[11\].z, r\d+.z, r0.y\n
mad r0.y, cb3\[12\].z, r\d+.w, r0.y\n
mov o6.w, -r0.y\n
add r\d+.xyw, -cb1\[5\].xyxz, cb2\[3\].xyxz\n)

[ShaderRegexMeshNatlanFace.Pattern.Replace]
${before}\n
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
if_nz cb12\[3\].y\n
	add ${reg}.xyw, -cb2\[3\].xyxz, cb12\[3\].xyxz\n
	mul ${reg}.xyw, ${reg}.xw, -${ini}.yyyy\n
	add ${reg}.xyw, cb2\[3\].xyxz, ${reg}.xyw\n
	add ${reg}.xyw, -cb1\[5\].xyxz, ${reg}.xyw\n
endif\n
add ${reg}.y, ${reg}.y, ${ini}.x\n

[ShaderRegexWeapon.Pattern]
(?'before'movc r\d+.xyzw, r\d+.zzzz, r\d+.xyzw, r\d+.xyzw\n
dp3 (?'reg'r\d+).x, v\d+.xyzx, cb0\[\d+\].xyzx\n
add r\d+.y, cb0\[\d+\].w, l\(-\d+.\d+\)\n
lt r\d+.y, r\d+.x, r\d+.y\n
add r\d+.x, r\d+.x, -cb0+\[\d+\].w\n
mad r\d+.xyz, -r\d+.xxxx, cb0+\[\d+\].xyzx, v\d+.xyzx\n
mov r\d+.w, l\(\d+\)\n
movc r\d+.xyzw, r\d+.yyyy, r\d+.xyzw, r\d+.xyzw\n
movc r\d+.xyzw, r\d+.wwww, r\d+.xyzw, r\d+.xyzw\n
movc r\d+.xyzw, r\d+.yyyy, r\d+.xyzw, r\d+.xyzw\n
add r\d+.xyw, -cb1\[5\].xyxz, cb2\[3\].xyxz\n)

[ShaderRegexWeapon.Pattern.Replace]
${before}\n
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
if_nz cb12\[3\].y\n
	add ${reg}.xyw, -cb2\[3\].xyxz, cb12\[3\].xyxz\n
	mul ${reg}.xyw, ${reg}.xw, -${ini}.yyyy\n
	add ${reg}.xyw, cb2\[3\].xyxz, ${reg}.xyw\n
	add ${reg}.xyw, -cb1\[5\].xyxz, ${reg}.xyw\n
endif\n
add ${reg}.y, ${reg}.y, ${ini}.x\n

[ShaderRegexOutlineNatlan.Pattern]
(?'before'mul r1.xyzw, v0.yyyy, cb\d\[1\].xyzw\n
mad r1.xyzw, cb\d\[0\].xyzw, v0.xxxx, r1.xyzw\n
mad r1.xyzw, cb\d\[2\].xyzw, v0.zzzz, r1.xyzw\n
add (?'reg'r\d+).xyzw, r1.xyzw, cb\d\[3\].xyzw\n
mul r0.w, r1.y, cb\d\[10\].z\n
mad r0.w, cb3\[9\].z, r1.x, r0.w\n
mad r0.w, cb3\[11\].z, r1.z, r0.w\n
mad r0.w, cb3\[12\].z, r1.w, r0.w\n
mov o4.w, -r0.w\n
add r1.xyw, -cb1\[5\].xyxz, cb\d\[3\].xyxz\n)

[ShaderRegexOutlineNatlan.Pattern.Replace]
${before}\n
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
if_nz cb13\[3\].y\n
	add ${reg}.xyw, -cb2\[3\].xyxz, cb12\[3\].xyxz\n
	mul ${reg}.xyw, ${reg}.xw, -${ini}.yyyy\n
	add ${reg}.xyw, cb2\[3\].xyxz, ${reg}.xyw\n
	add ${reg}.xyw, -cb1\[5\].xyxz, ${reg}.xyw\n
endif\n
add ${reg}.y, ${reg}.y, ${ini}.x\n

[ShaderRegexOutline.Pattern]
(?'before'\s+mov r\d+.x, cb3\[0\].x
\s+mov r\d+.y, cb3\[1\].x
\s+mov r\d+.z, cb3\[2\].x
\s+mov r\d+.w, r\d+.x
(\s+mov r\d+.xyz, v0.xyzx)?
\s+mov r\d+.w, l\(1.000000\)
\s+dp4 r\d+.x, r\d+.xyzw, r\d+.xyzw
\s+mov r\d+.x, cb3\[0\].y
\s+mov r\d+.y, cb3\[1\].y
\s+mov r\d+.z, cb3\[2\].y
\s+mov r\d+.w, r\d+.y
\s+dp4 r\d+.y, r\d+.xyzw, r\d+.xyzw
\s+mov (?'reg'r\d+).x, cb3\[0\].z
\s+mov r\d+.y, cb3\[1\].z
\s+mov r\d+.z, cb3\[2\].z
\s+dp4 r\d+.z, r\d+.xyzw, r\d+.xyzw
\s+mov r\d+.x, cb3\[0\].w
\s+mov r\d+.y, cb3\[1\].w
\s+mov r\d+.z, cb3\[2\].w
\s+mov r\d+.w, cb3\[3\].w)
(?'after'\s+dp4 r\d+.w, r\d+.xyzw, r\d+.xyzw)\n

[ShaderRegexOutline.Pattern.Replace]
\nld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(169,0), t120.xyzw\n
if_nz cb13\[3\].y\n
	add ${reg}.xyw, -cb3\[3\].xyxz, cb13\[3\].xyxz\n
	mul ${reg}.xyw, ${reg}.xw, -${ini}.yyyy\n
	add ${reg}.xyw, cb3\[3\].xyxz, ${reg}.xyw\n
	add ${reg}.xyw, -cb1\[5\].xyxz, ${reg}.xyw\n
endif\n
add $3.y, $3.y, ${ini}.x\n
${before}\n
${after}\n

