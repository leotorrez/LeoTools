namespace = global\offset
; OffsetFix.ini Version 4.0.4
; - Solves crash caused by Natlan units entering Nightsoul
; - Fixes LOD and Bangs Shadow
; - Fixes AA issues on offset meshes. Kudos to XBaniX for the help
; - Add weapon support

; Check latest version at: https://github.com/leotorrez/LeoTools/releases
; Author: LeoTorreZ
;
; Description: - Offsets models in the vertical axis
;              - Experimental face scale - Somewhat deprecated
;              - Experimental face weapon offset
;
; How to use: https://github.com/leotorrez/LeoTools/blob/main/guides/ChangeSizeGuide.md
;

[Constants]
global $active = 0
global $faceActive = 0
global $offset = 0
global $faceOffset = 0
global $faceScale = 1

[CommandListOffset]
if DRAW_TYPE != 1
	x169 = $offset
	y169 = $faceOffset
	x170 = 0
	x171 = 1
	$active = 1
endif

[CommandListOffsetFace]
; Left to avoid error triggering in old mods
if DRAW_TYPE != 1
	x169 = $offset
	y169 = $faceOffset
	x170 = 0
	x171 = 1
	$active = 1
endif

[CommandListClean]
$active = 0
$offset = 0
$faceActive = 0
x169 = 0
y169 = 0
x170 = 0
x171 = 1
vs-cb12 = null
vs-cb13 = null

;----------------------------------- REGEX DECLARATIONS ----------------------------------

