\s+mov r\d+.y, cb3\[1\].x
\s+mov r\d+.z, cb3\[2\].x
\s+mov r\d+.w, r\d+.x
(\s+mov r\d+.xyz, r\d+.xyzx)?
\s+mov r\d+.w, v0.w
