; Global Texture Overides --------------------------------
; We use the Natlan Tattoo textures both to detect if traveler is the active character
; and to null the tattoo in modded travelers (so old mods don't get default tattoo drawn over their new UVs).
; If someone mods the tattoo themselves it will override this behaviour due to the priority order

[TextureOverrideAetherNatlanTattoo]
hash = 4ec15721
match_priority = -999999
if ib > 0
	this = null
endif
$traveleractive = 1

[TextureOverrideLumineNatlanTattoo]
hash = cc3ad362
match_priority = -999999
if ib > 0
	this = null
endif
$traveleractive = 1

; Shaders matches --------------------------------------------
; 037730.0  -> Character's Outline VS
; 037730.1  -> Character's Reflection VS(/PS and the only PS with 037730.X to avoid interfering with TexFx)
; 037730.3  -> Character's Flamy Outline VS (Natlan Characters)
; 037730.4  -> Character's Tattoos VS (Natlan Characters)
; 037730.7  -> Character's Diffuse VS for heightmap/normalmap Characters

; 037733.0  -> Character's Diffuse VS Face
; 037733.1  -> Character's Diffuse VS Face LODs
; 037733.2  -> Character's Diffuse VS Eyes Columbina
; 037733.3  -> Character's Diffuse VS Mask Columbina
;
; 037731.0  -> Character's Diffuse VS for NormalMap Characters New Slots
; 037731.1  -> Character's Diffuse VS for NormalMap Characters New Slots
; 037731.2  -> Character's Diffuse PS for NormalMap EscoffierShinyLegs no fix
; 037731.3  -> Character's Diffuse PS for NormalMap NeuvilleteBody Old Slot Format  aka Nofix
; 037731.4  -> Character's Diffuse PS for NormalMap Escoffier tail unique slot
; 037731.14 -> Character's Diffuse PS for heightmap/normalmap Characters slot 4
; 037731.15 -> Character's Diffuse PS for heightmap/normalmap Characters slot 5
; 037731.16 -> Character's Diffuse PS for heightmap/normalmap Characters slot 6
; 037731.17 -> Character's Diffuse PS for heightmap/normalmap Characters slot 7
; 037731.18 -> Character's Diffuse PS for heightmap/normalmap Characters slot 8
; 037731.19 -> Character's Diffuse PS for heightmap/normalmap Characters slot 9
; 037731.57 -> Character's Diffuse PS for heightmap/normalmap Characters slot 5 & 7
; 037731.67 -> Character's Diffuse PS for heightmap/normalmap Characters slot 6 & 7
; 037731.79 -> Character's Diffuse PS for heightmap/normalmap Characters slot 7 & 9
; 037731.9  -> Character's Diffuse VS LOD
;
; 037732    -> Character's Heightmap VS This are the sus extra normalmap slots
; 037733    -> Character's Heightmap DoubleSided VS This are the sus extra normalmap slots
; 037734    -> Dashfix
; 037735    -> Skirk Limbs
; 037736    -> Varesa Burst
; 037737    -> Furina Burst
; 037738    -> AA first pass
; 037739    -> Shadow first pass
